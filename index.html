<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1208" />
    <!-- PWA / Add-to-Home-Screen wiring. All hrefs are relative so the game
         keeps working from the GitHub Pages subpath (/eldoria-v2/). -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Eldoria" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <title>Realm of Eldoria v2</title>
  </head>
  <body>
    <main id="app">
      <div id="game-root" aria-label="Realm of Eldoria game canvas"></div>
      <aside id="orientation-lock" role="status" aria-label="Landscape orientation required">
        <div class="orientation-lock__rune" aria-hidden="true">&#x2726;</div>
        <h1>Turn your device sideways</h1>
        <p>Eldoria is easiest to explore in landscape.</p>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
