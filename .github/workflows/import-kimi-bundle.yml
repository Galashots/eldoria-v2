name: Diagnose reviewed Kimi branch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check out review target
        run: |
          git fetch origin chatgpt/kimi-audit-improvements
          git checkout -B review-target origin/chatgpt/kimi-audit-improvements
      - run: npm ci
      - name: Capture unit-test output
        run: |
          set +e
          npm run test:unit > unit-output.txt 2>&1
          echo $? > unit-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: kimi-unit-diagnostic
          path: |
            unit-output.txt
            unit-status.txt
          retention-days: 3
      - name: Enforce unit-test result
        run: |
          cat unit-output.txt
          test "$(cat unit-status.txt)" = "0"
