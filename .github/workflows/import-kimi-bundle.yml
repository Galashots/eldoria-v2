name: Publish clean reviewed Kimi branch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish-reviewed-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Build one reviewed commit on current main
        run: |
          git fetch origin main chatgpt/kimi-audit-improvements
          git checkout -B reviewed origin/chatgpt/kimi-audit-improvements
          test "$(git rev-parse HEAD)" = "a2a280fc2b8050bff035b13f066bda734c3a9b0f"
          git reset --soft origin/main
          git config user.name "ChatGPT Repo Agent"
          git config user.email "actions@users.noreply.github.com"
          git diff --cached --check
          git diff --quiet origin/main -- .github/workflows/ci.yml
          git commit -m "Integrate reviewed Kimi-K3 audit improvements"
          git push --force origin HEAD:refs/heads/chatgpt/kimi-audit-improvements-reviewed
