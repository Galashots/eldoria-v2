name: Finalize reviewed Kimi changelog

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Preserve patch and check out review target
        run: |
          cp .github/import/patch-kimi-changelog.py /tmp/patch-kimi-changelog.py
          git fetch origin chatgpt/kimi-audit-improvements
          git checkout -B review-target origin/chatgpt/kimi-audit-improvements
      - name: Reconcile changelog
        run: python /tmp/patch-kimi-changelog.py
      - name: Commit and push target branch
        run: |
          git config user.name "ChatGPT Repo Agent"
          git config user.email "actions@users.noreply.github.com"
          git add docs/CHATGPT_CHANGELOG.md
          git diff --cached --check
          git commit -m "Reconcile Kimi audit changelog after independent review"
          git push origin HEAD:refs/heads/chatgpt/kimi-audit-improvements
