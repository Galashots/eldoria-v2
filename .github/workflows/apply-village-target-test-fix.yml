name: Apply village target-test correction

on:
  pull_request:
    paths:
      - '.github/patch-village-visual-target-test.py'
      - '.github/workflows/apply-village-target-test-fix.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check out target branch
        run: |
          git fetch origin chatgpt/village-art-top-gaps
          git checkout -B target origin/chatgpt/village-art-top-gaps
      - run: python .github/patch-village-visual-target-test.py
      - name: Commit correction when needed
        run: |
          if git diff --quiet -- scripts/test-visual-targets.mjs; then
            echo "No correction needed."
            exit 0
          fi
          git config user.name "ChatGPT Repo Agent"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/test-visual-targets.mjs
          git diff --cached --check
          git commit -m "Update deferred village palette expectation"
          git push origin HEAD:refs/heads/chatgpt/village-art-top-gaps
