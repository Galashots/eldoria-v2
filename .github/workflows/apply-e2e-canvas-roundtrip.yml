name: Apply E2E Canvas round-trip tolerance

on:
  pull_request:
    paths:
      - '.github/patch-e2e-canvas-roundtrip.py'
      - '.github/workflows/apply-e2e-canvas-roundtrip.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check out target branch
        run: |
          git fetch origin chatgpt/e2e-canvas-renderer
          git checkout -B target origin/chatgpt/e2e-canvas-renderer
      - run: python .github/patch-e2e-canvas-roundtrip.py
      - name: Commit correction when needed
        run: |
          if git diff --quiet -- tests/vertical-slice.spec.ts; then
            echo "No correction needed."
            exit 0
          fi
          git config user.name "ChatGPT Repo Agent"
          git config user.email "actions@users.noreply.github.com"
          git add tests/vertical-slice.spec.ts
          git diff --cached --check
          git commit -m "Make E2E movement return bounds renderer-agnostic"
          git push origin HEAD:refs/heads/chatgpt/e2e-canvas-renderer
