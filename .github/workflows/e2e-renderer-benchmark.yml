name: E2E renderer benchmark

on:
  pull_request:
    paths:
      - 'src/main.ts'
      - 'tests/e2e-renderer.spec.ts'
      - 'tests/vertical-slice.spec.ts'
      - '.github/workflows/e2e-renderer-benchmark.yml'

permissions:
  contents: read

jobs:
  compare-renderers:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out baseline
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: baseline
      - name: Check out candidate
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install baseline dependencies
        working-directory: baseline
        run: npm ci
      - name: Install candidate dependencies and Chromium
        working-directory: candidate
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run comparable full-suite benchmarks
        shell: bash
        run: |
          set -uo pipefail
          : > benchmark.txt

          run_suite() {
            local label="$1"
            local directory="$2"
            local success=0
            local chosen_seconds=0
            local total_warnings=0

            for attempt in 1 2; do
              local started ended status warning_count elapsed log
              log="${label}-attempt-${attempt}.log"
              started=$(date +%s)
              set +e
              (
                cd "$directory"
                CI=1 npx playwright test 2>&1
              ) | tee "$log"
              status=${PIPESTATUS[0]}
              set -e
              ended=$(date +%s)
              elapsed=$((ended - started))
              warning_count=$(grep -c "WebGL Context lost" "$log" || true)
              total_warnings=$((total_warnings + warning_count))

              echo "${label}_attempt_${attempt}_seconds=${elapsed}" | tee -a benchmark.txt
              echo "${label}_attempt_${attempt}_status=${status}" | tee -a benchmark.txt
              echo "${label}_attempt_${attempt}_webgl_context_lost_warnings=${warning_count}" | tee -a benchmark.txt

              if test "$status" -eq 0; then
                success=1
                chosen_seconds=$elapsed
                break
              fi
            done

            echo "${label}_seconds=${chosen_seconds}" | tee -a benchmark.txt
            echo "${label}_webgl_context_lost_warnings=${total_warnings}" | tee -a benchmark.txt
            test "$success" -eq 1
          }

          run_suite baseline baseline
          run_suite candidate candidate

          baseline_seconds=$(awk -F= '/^baseline_seconds=/{print $2}' benchmark.txt)
          candidate_seconds=$(awk -F= '/^candidate_seconds=/{print $2}' benchmark.txt)
          improvement=$((baseline_seconds - candidate_seconds))
          echo "wall_time_improvement_seconds=${improvement}" | tee -a benchmark.txt

          candidate_warnings=$(awk -F= '/^candidate_webgl_context_lost_warnings=/{print $2}' benchmark.txt)
          test "$candidate_warnings" -eq 0
      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-renderer-benchmark-pr-${{ github.event.pull_request.number }}
          path: |
            benchmark.txt
            baseline-attempt-*.log
            candidate-attempt-*.log
          retention-days: 14
