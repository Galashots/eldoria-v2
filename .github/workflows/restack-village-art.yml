name: Restack village art after E2E renderer

on:
  pull_request:
    paths:
      - '.github/workflows/restack-village-art.yml'

permissions:
  contents: write

jobs:
  restack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Merge current main into village-art branch
        run: |
          git config user.name "ChatGPT Repo Agent"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin main chatgpt/village-art-top-gaps
          git checkout -B target origin/chatgpt/village-art-top-gaps
          git merge --no-edit origin/main
          git diff --check origin/main...HEAD
          git push origin HEAD:refs/heads/chatgpt/village-art-top-gaps
