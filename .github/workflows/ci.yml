name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run repository check
        run: |
          set -o pipefail
          npm run check 2>&1 | tee check-output.txt
      - name: Upload check diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: check-diagnostics-pr-${{ github.event.pull_request.number }}
          path: check-output.txt
          retention-days: 3
      - name: Run visual-target validator tests
        run: npm run test:visual-targets
      - run: npm run test:asset-pipeline
      - name: Run terrain-blend compositor tests
        run: npm run test:terrain-blend
      - run: npm run test:unit
      - name: Get installed Playwright version
        id: playwright-version
        run: |
          echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - run: npx playwright install --with-deps chromium
      - name: Run browser smoke suite
        run: |
          set -o pipefail
          npm run smoke 2>&1 | tee smoke-output.txt
      - name: Upload smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-diagnostics-pr-${{ github.event.pull_request.number }}
          path: |
            smoke-output.txt
            test-results/**
          if-no-files-found: warn
          retention-days: 3
      - name: Upload visual playtest evidence
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: visual-playtest-pr-${{ github.event.pull_request.number }}
          path: |
            test-results/opening-*.png
            test-results/slime-*.png
            test-results/ranger-*.png
            test-results/discovery-*.png
            test-results/baseline-*.png
          if-no-files-found: warn
          retention-days: 14
      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  # Offline-PWA + iPad-emulation suites. A SEPARATE job (not extra steps in
  # `build`) so it runs in parallel and never slows the default smoke suite:
  # `build` uses the dev server and never builds a preview, this job builds the
  # production bundle and drives it through `vite preview`.
  emulation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Get installed Playwright version
        id: playwright-version
        run: |
          echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - run: npx playwright install --with-deps chromium
      - name: Run offline-PWA + iPad-emulation suites
        run: |
          set -o pipefail
          npm run test:emulation 2>&1 | tee emulation-output.txt
      - name: Upload emulation report and evidence
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: emulation-evidence-pr-${{ github.event.pull_request.number }}
          path: |
            emulation-output.txt
            playwright-report/**
            test-results/**
          if-no-files-found: warn
          retention-days: 14

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: false
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Post-deploy health check
        run: |
          # Lightweight smoke check that the published Pages URL
          # (https://galashots.github.io/eldoria-v2/) is actually serving
          # after deploy-pages reports success. A couple of retries with a
          # short delay absorbs normal Pages propagation lag.
          url="${{ steps.deployment.outputs.page_url }}"
          for attempt in 1 2 3; do
            if curl -sf --max-time 10 "$url" > /dev/null; then
              echo "Health check passed on attempt $attempt for $url"
              exit 0
            fi
            echo "Health check attempt $attempt failed for $url, retrying..."
            sleep 5
          done
          echo "Health check failed after 3 attempts for $url"
          exit 1
