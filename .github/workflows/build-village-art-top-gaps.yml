name: Build village art top gaps

on:
  pull_request:
    paths:
      - 'scripts/build-village-art-top-gaps.mjs'
      - 'scripts/test-village-art-top-gaps.mjs'
      - 'docs/visual-targets/village_shop_roof_target.json'
      - 'package.json'
      - '.github/workflows/build-village-art-top-gaps.yml'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check out target branch
        run: |
          git fetch origin chatgpt/village-art-top-gaps
          git checkout -B target origin/chatgpt/village-art-top-gaps
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run deterministic source, normalization, review, packing, and contact-sheet pipeline
        run: npm run build:village-art
      - name: Verify exact runtime/source/packed contracts
        run: |
          npm run test:village-art
          npm run validate:visual-targets
          git diff --check
      - name: Commit generated review package
        run: |
          git config user.name "ChatGPT Repo Agent"
          git config user.email "actions@users.noreply.github.com"
          git add \
            assets/source/generated/tile_village_shop_wall \
            assets/source/generated/tile_village_shop_door \
            assets/source/generated/tile_village_shop_roof \
            assets/manifests/tile_village_shop_wall.manifest.json \
            assets/manifests/tile_village_shop_door.manifest.json \
            assets/manifests/tile_village_shop_roof.manifest.json \
            assets/tilesets/tile_village_shop_wall.png \
            assets/tilesets/tile_village_shop_door.png \
            assets/tilesets/tile_village_shop_roof.png \
            docs/art-pipeline/review/tile_village_shop_wall_stone_base \
            docs/art-pipeline/review/tile_village_shop_wall_wood_trim \
            docs/art-pipeline/review/tile_village_shop_wall_window_lit \
            docs/art-pipeline/review/tile_village_shop_door_closed \
            docs/art-pipeline/review/tile_village_shop_door_highlighted \
            docs/art-pipeline/review/tile_village_shop_door_open_optional \
            docs/art-pipeline/review/tile_village_shop_roof_thatch_base \
            docs/art-pipeline/review/tile_village_shop_roof_thatch_moss \
            docs/art-pipeline/review/tile_village_shop_roof_ridge \
            docs/art-pipeline/review/village_top_gaps \
            docs/visual-targets/farm_village_tile_targets.json
          if git diff --cached --quiet; then
            echo "Generated village art is already current."
            exit 0
          fi
          git diff --cached --check
          git commit -m "Generate reviewed village building art families"
          git push origin HEAD:refs/heads/chatgpt/village-art-top-gaps
